<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Concert</title>
  <style>
    :root {
      --line: #2a3240;
      --line-soft: #202735;
      --text: #eef2f8;
      --muted: #9aa3b6;
      --chip: #1a212d;
      --chip-on: rgba(217, 134, 82, 0.22);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 999px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top, rgba(50, 76, 96, 0.32), transparent 34%),
        linear-gradient(180deg, #111723 0%, #0b1017 100%);
      color: var(--text);
    }

    .app-shell {
      width: min(1120px, calc(100vw - 32px));
      margin: 28px auto 40px;
      display: grid;
      gap: 10px;
    }

    .panel {
      background: linear-gradient(180deg, rgba(24, 30, 40, 0.96), rgba(17, 22, 30, 0.98));
      border: 1px solid var(--line-soft);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 20px 20px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 14px;
      border-radius: var(--radius-sm);
      background: rgba(110, 183, 165, 0.14);
      color: #8fd3c2;
      font-size: 0.94rem;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .stack {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }

    .url-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .playlist-row {
      position: relative;
      display: block;
    }

    .playlist-row::before {
      content: "재생목록";
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 1rem;
      pointer-events: none;
      z-index: 1;
    }

    .playlist-row select {
      position: relative;
      z-index: 0;
      color: transparent;
      text-shadow: 0 0 0 transparent;
      caret-color: transparent;
    }

    .playlist-row select option {
      color: var(--text);
    }

    .thumbnail-panel {
      display: none;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(17, 22, 30, 0.96);
      aspect-ratio: 16 / 9;
    }

    .thumbnail-panel.visible {
      display: block;
    }

    .thumbnail-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #0e131c;
    }

    .meta-panel {
      display: grid;
      gap: 12px;
      padding: 18px 18px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(17, 22, 30, 0.96);
    }

    .meta-title {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 700;
      min-height: 25px;
      align-items: center;
      color: var(--text);
    }

    .status-box {
      display: grid;
      gap: 10px;
    }

    .controls-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .spacer {
      flex: 1 1 auto;
    }

    .toggle-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-left: auto;
    }

    .settings-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line-soft);
    }

    .settings-panel-title {
      margin: 0;
      font-size: 1.02rem;
      font-weight: 800;
      color: var(--text);
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    input[type="text"],
    input[type="number"],
    select {
      width: 100%;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: #0e131c;
      color: var(--text);
      padding: 0 16px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: rgba(217, 134, 82, 0.8);
      box-shadow: 0 0 0 3px rgba(217, 134, 82, 0.14);
    }

    input[type="range"] {
      width: 100%;
      accent-color: #4f8ff5;
    }

    button,
    .chip {
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      background: #232a36;
      color: var(--text);
      font: inherit;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, opacity 0.18s ease;
    }

    button:hover,
    .chip:hover {
      transform: translateY(-1px);
      background: #2c3443;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .primary-button {
      height: 48px;
      padding: 0 20px;
      background: linear-gradient(180deg, #dd8c57, #b56739);
      color: #fff9f4;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(217, 134, 82, 0.22);
    }

    .icon-button {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 50%;
      background: #262d39;
      font-size: 1rem;
      font-weight: 800;
    }

    .icon-button svg {
      width: 18px;
      height: 18px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-button.active {
      background: linear-gradient(180deg, #dd8c57, #b56739);
      color: #fff9f4;
      border-color: rgba(217, 134, 82, 0.6);
      box-shadow: 0 10px 24px rgba(217, 134, 82, 0.18);
    }

    .play-button {
      width: 58px;
      height: 58px;
      background: linear-gradient(180deg, #ec9862, #c27141);
      box-shadow: 0 12px 28px rgba(217, 134, 82, 0.24);
      font-size: 1.12rem;
    }

    .mute-button {
      width: 10px;
      height: 10px;
      margin-left: 20px;
      font-size: 1rem;
      background: #00000000;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 38px;
      padding: 0 14px;
      background: var(--chip);
      border-color: var(--line);
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
      user-select: none;
    }

    .chip input {
      display: none;
    }

    .chip.active {
      background: var(--chip-on);
      border-color: rgba(217, 134, 82, 0.6);
      color: #ffd7be;
    }

    .toggle-row .chip {
      width: 42px;
      min-width: 42px;
      height: 42px;
      min-height: 42px;
      padding: 0;
      border-radius: 50%;
      justify-content: center;
      gap: 0;
      background: #262d39;
      color: var(--text);
      font-size: 1rem;
      font-weight: 800;
    }

    .toggle-row .chip svg {
      width: 18px;
      height: 18px;
      display: block;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .toggle-row .chip.active {
      background: linear-gradient(180deg, #dd8c57, #b56739);
      color: #fff9f4;
      border-color: rgba(217, 134, 82, 0.6);
      box-shadow: 0 10px 24px rgba(217, 134, 82, 0.18);
    }

    .volume-group {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .volume-slider {
      flex: 0 0 80px;
      width: 80px;
      min-width: 0px;
      margin-left: 0px;
    }

    .time-readout,
    .status-text {
      color: var(--muted);
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .status-text {
      display: inline-block;
      width: 200px;
      min-height: 24px;
      overflow: hidden;
      position: relative;
      vertical-align: middle;
    }

    .status-text-inner {
      display: inline-block;
      white-space: nowrap;
      will-change: transform;
    }

    .status-text.marquee .status-text-inner {
      animation: status-marquee var(--status-marquee-duration, 6s) linear infinite;
    }

    @keyframes status-marquee {
      0%, 12% {
        transform: translateX(0);
      }
      88%, 100% {
        transform: translateX(calc(-1 * var(--status-marquee-distance, 0px)));
      }
    }

    .settings-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .settings-actions .subtle-button {
      width: auto;
      min-width: 96px;
    }

    .track-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 18px;
    }

    .track-card {
      display: grid;
      gap: 10px;
      min-height: 110px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(17, 22, 30, 0.94);
    }

    .track-card h3,
    .track-card p {
      margin: 0;
    }

    .track-card h3 {
      font-size: 1rem;
    }

    .track-card .track-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .track-card .track-desc {
      color: #c1c8d6;
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .footer-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 18px;
    }

    .subtle-button {
      height: 42px;
      padding: 0 16px;
      border-color: var(--line);
      background: transparent;
      color: var(--muted);
    }

    .visually-hidden {
      position: absolute !important;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 860px) {
      .panel {
        padding: 20px;
      }

      .settings-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toggle-row {
        width: 100%;
        margin-left: 0;
      }

    }

    @media (max-width: 640px) {
      .app-shell {
        width: min(100vw - 20px, 1120px);
        margin: 18px auto 28px;
      }

      .url-row {
        grid-template-columns: 1fr;
      }

      .settings-grid {
        grid-template-columns: 1fr;
      }

      .controls-row {
        justify-content: flex-start;
      }

      .spacer {
        display: none;
      }

    }
  </style>
</head>
<body>
  <main class="app-shell">
    <section class="panel">
      <span class="eyebrow">YouTube Concert</span>

      <div class="stack">
        <div class="url-row">
          <input id="youtubeUrlVisible" type="text" placeholder="https://www.youtube.com/watch?v=...">
          <button id="loadButtonVisible" class="primary-button" type="button">불러오기</button>
        </div>

        <div id="thumbnailPanel" class="thumbnail-panel" aria-hidden="true">
          <img id="trackThumbnail" class="thumbnail-image" alt="" loading="lazy">
        </div>

        <div class="meta-panel">
          <p class="meta-title" id="metaText">아직 불러온 곡이 없습니다.</p>
          <div class="status-box">
            <input id="playbackSlider" class="playback-slider" type="range" min="0" max="1000" value="0" disabled>
          </div>

          <div class="controls-row">
            <button id="prevButton" class="icon-button" type="button" title="이전 곡">⏮</button>
            <button id="playPauseButton" class="icon-button play-button" type="button" title="재생">▶</button>
            <button id="nextButton" class="icon-button" type="button" title="다음 곡">⏭</button>

            <div class="volume-group">
              <button id="muteButton" class="icon-button mute-button" type="button" title="음소거">🔊</button>
              <input id="playerVolume" class="volume-slider" type="range" min="0" max="100" value="70">
              <span id="playbackTimes" class="time-readout">0:00/0:00</span>
            </div>
            
            <span id="inlineStatus" class="status-text"></span>
            <div class="spacer"></div>

            <div class="toggle-row">
              <label id="loopChip" class="chip" for="loopPlayback" title="현재 곡 반복" aria-label="현재 곡 반복">
                <input id="loopPlayback" type="checkbox">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M17 2l4 4-4 4"></path>
                  <path d="M3 11V9a3 3 0 0 1 3-3h15"></path>
                  <path d="M7 22l-4-4 4-4"></path>
                  <path d="M21 13v2a3 3 0 0 1-3 3H3"></path>
                </svg>
                <span class="visually-hidden">반복</span>
              </label>
              <input id="playlistLoop" type="checkbox" checked class="visually-hidden">
              <label id="shuffleChip" class="chip" for="shufflePlayback" title="셔플" aria-label="셔플">
                <input id="shufflePlayback" type="checkbox">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M16 3h5v5"></path>
                  <path d="M4 4l6 6"></path>
                  <path d="M14 14l7 7"></path>
                  <path d="M21 3l-7 7"></path>
                  <path d="M4 20l5-5"></path>
                  <path d="M16 21h5v-5"></path>
                </svg>
                <span class="visually-hidden">셔플</span>
              </label>
              <button id="originalToggleButton" class="icon-button" type="button" title="원본 모드" aria-label="원본 모드">
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M12 3v7"></path>
                  <path d="M7.05 5.05a9 9 0 1 0 9.9 0"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div class="playlist-row">
          <select id="playlistSelectRow" disabled>
            <option value="">재생목록</option>
          </select>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="settings-panel-head">
        <h2 class="settings-panel-title">재생 설정</h2>
        <button id="applySettingsButton" class="subtle-button" type="button">적용</button>
      </div>

      <div class="settings-grid">
        <div class="field">
          <label for="roomPreset">공간 프리셋</label>
          <select id="roomPreset">
            <option value="dry">드라이</option>
            <option value="stage">스테이지</option>
            <option value="hall" selected>콘서트홀</option>
            <option value="cathedral">성당</option>
          </select>
        </div>
        <div class="field">
          <label for="audiencePreset">관객석 위치</label>
          <select id="audiencePreset">
            <option value="front">무대 앞</option>
            <option value="mid" selected>객석 중간</option>
            <option value="rear">객석 뒤</option>
            <option value="outside">공연장 밖</option>
          </select>
        </div>
        <div class="field">
          <label for="cloneCount">트랙 개수</label>
          <input id="cloneCount" type="number" min="1" max="8" step="1" value="3">
        </div>
        <div class="field">
          <label for="ensembleVolume">합주 볼륨(%)</label>
          <input id="ensembleVolume" type="number" min="0" max="100" step="1" value="70">
        </div>
        <div class="field">
          <label for="delayMs">딜레이(ms)</label>
          <input id="delayMs" type="number" min="0" step="1" value="160">
        </div>
        <div class="field">
          <label for="volumeDecay">볼륨 감소율(%)</label>
          <input id="volumeDecay" type="number" min="0" step="1" value="50">
        </div>
        <div class="field">
          <label for="reverbIntensity">울림 강도(%)</label>
          <input id="reverbIntensity" type="number" min="0" max="100" step="1" value="40">
        </div>
        <div class="field">
          <label for="diffusionAmount">확산 강도(%)</label>
          <input id="diffusionAmount" type="number" min="0" max="100" step="1" value="90">
        </div>
        <div class="field">
          <label for="auxiliaryAmount">보조 반사층(%)</label>
          <input id="auxiliaryAmount" type="number" min="0" max="100" step="1" value="90">
        </div>
        <div class="field">
          <label for="peakSuppression">피크 억제 강도(%)</label>
          <input id="peakSuppression" type="number" min="0" max="100" step="1" value="70">
        </div>
      </div>
    </section>

    <section class="panel">
      <div id="trackGrid" class="track-grid"></div>
    </section>

    <div class="footer-row">
      <button id="shutdownButton" class="subtle-button" type="button">종료</button>
    </div>
  </main>
  <script>
__AUDIO_PRESETS_JS__
  </script>
  <script>
__AUDIO_ENGINE_JS__
  </script>
  <script>
__CLIENT_AUDIO_JS__
  </script>
</body>
</html>

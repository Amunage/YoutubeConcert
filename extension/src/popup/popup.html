<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Concert Live</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main class="popup-shell">
    <section class="hero">
      <p id="appVersion" class="app-version" aria-label="Extension version"></p>
      <p class="eyebrow">Sound Live FX</p>
      <h1>YT Concert Live</h1>
    </section>

    <section class="card status-card">
      <div>
        <p class="label">Status</p>
        <p id="statusText" class="status-text" aria-live="polite">Idle</p>
        <p id="tabMeta" class="tab-meta" aria-label="Current tab title">
          <span id="tabMetaTrack" class="tab-meta-track">
            <span id="tabMetaText" class="tab-meta-text"></span>
            <span id="tabMetaTextClone" class="tab-meta-text tab-meta-text-clone" aria-hidden="true"></span>
          </span>
        </p>
      </div>
      <button id="toggleButton" class="primary-button" type="button">Start</button>
    </section>

    <section class="card">
      <div class="field">
        <label for="roomPreset">Space Preset</label>
        <select id="roomPreset">
          <option value="club">Club</option>
          <option value="theater">Theater</option>
          <option value="arena">Arena</option>
          <option value="stadium">Stadium</option>
        </select>
      </div>

      <div class="field">
        <label for="audiencePosition">Listener Position <span id="audiencePositionValue"></span></label>
        <input id="audiencePosition" type="range" min="1" max="10" step="1">
      </div>

      <div class="field">
        <label for="cloneCount">Layer Count <span id="cloneCountValue"></span></label>
        <input id="cloneCount" type="range" min="1" max="8" step="1">
      </div>

      <div class="field">
        <label for="delayMs">Delay <span id="delayMsValue"></span></label>
        <input id="delayMs" type="range" min="0" max="320" step="5">
      </div>
    </section>

    <details class="card advanced-card" id="advancedOptions">
      <summary class="advanced-summary">
        <span>Advanced</span>
        <span class="advanced-summary-hint">Fine-tune</span>
      </summary>

      <div class="advanced-fields">
        <div class="field">
          <label for="ensembleVolume">Layer Volume <span id="ensembleVolumeValue"></span></label>
          <input id="ensembleVolume" type="range" min="0" max="100" step="1">
        </div>

        <div class="field">
          <label for="volumeDecay">Layer Decay <span id="volumeDecayValue"></span></label>
          <input id="volumeDecay" type="range" min="0" max="100" step="1">
        </div>

        <div class="field">
          <label for="reverbIntensity">Reverb Intensity <span id="reverbIntensityValue"></span></label>
          <input id="reverbIntensity" type="range" min="0" max="100" step="1">
        </div>

        <div class="field">
          <label for="diffusionAmount">Diffusion <span id="diffusionAmountValue"></span></label>
          <input id="diffusionAmount" type="range" min="0" max="100" step="1">
        </div>

        <div class="field">
          <label for="auxiliaryAmount">Auxiliary Reflections <span id="auxiliaryAmountValue"></span></label>
          <input id="auxiliaryAmount" type="range" min="0" max="100" step="1">
        </div>

        <div class="field">
          <label for="peakSuppression">Peak Suppression <span id="peakSuppressionValue"></span></label>
          <input id="peakSuppression" type="range" min="0" max="100" step="1">
        </div>

        <div class="field">
          <label for="directMixTrim">Direct Mix <span id="directMixTrimValue"></span></label>
          <input id="directMixTrim" type="range" min="0" max="200" step="5">
        </div>

        <div class="field">
          <label for="preDelayScale">Pre-delay Scale <span id="preDelayScaleValue"></span></label>
          <input id="preDelayScale" type="range" min="0" max="200" step="5">
        </div>

        <div class="field">
          <label for="tailGainScale">Reverb Tail Level <span id="tailGainScaleValue"></span></label>
          <input id="tailGainScale" type="range" min="0" max="200" step="5">
        </div>

        <div class="field">
          <label for="reflectionSpacing">Reflection Spacing <span id="reflectionSpacingValue"></span></label>
          <input id="reflectionSpacing" type="range" min="50" max="200" step="5">
        </div>

        <div class="field">
          <label for="dynamicWetTrimStrength">Auto Wet Trim <span id="dynamicWetTrimStrengthValue"></span></label>
          <input id="dynamicWetTrimStrength" type="range" min="0" max="200" step="5">
        </div>

        <section class="experimental-section" aria-labelledby="experimentalTitle">
          <div class="experimental-header">
            <div>
              <p id="experimentalTitle" class="experimental-title">Experimental</p>
              <p class="experimental-copy">Optional tests that stay off by default.</p>
            </div>
          </div>

          <label class="toggle-field" for="experimentalLargeSpaceModulation">
            <div class="toggle-copy">
              <span class="toggle-title">Large Space Micro Modulation</span>
            </div>
            <input id="experimentalLargeSpaceModulation" type="checkbox" role="switch">
          </label>

          <label class="toggle-field" for="experimentalSubtleSpaceResponse">
            <div class="toggle-copy">
              <span class="toggle-title">Subtle Space Response</span>
            </div>
            <input id="experimentalSubtleSpaceResponse" type="checkbox" role="switch">
          </label>

          <label class="toggle-field" for="experimentalCrowdReaction">
            <div class="toggle-copy">
              <span class="toggle-title">Crowd Reaction Layer</span>
            </div>
            <input id="experimentalCrowdReaction" type="checkbox" role="switch">
          </label>
        </section>

        <div class="advanced-actions">
          <button id="resetAdvancedButton" class="secondary-button" type="button">Reset Advanced</button>
        </div>
      </div>
    </details>

  </main>
  <div id="hoverHint" class="hover-hint" role="tooltip" aria-hidden="true"></div>
  <script type="module" src="popup.js"></script>
</body>
</html>
